AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Multi-app Flask hosting — single EC2 instance running yStocker, yPlanner,
  yPlanter, and yHome. Each app gets its own Gunicorn process, systemd
  service, and nginx vhost with automatic Let's Encrypt SSL.

# -----------------------------------------------------------------------------
# Parameters
# -----------------------------------------------------------------------------
Parameters:

  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.micro, t3.small, t3.medium, t3.large]
    Description: EC2 instance type (t3.micro is free-tier eligible)

  KeyName:
    Type: String
    Default: ""
    Description: Name of an existing EC2 key pair for SSH access

  AllowedSSHCidr:
    Type: String
    Default: "0.0.0.0/0"
    Description: CIDR range allowed to SSH into the instance

  DomainYStocker:
    Type: String
    Default: "stock.li-family.us"
    Description: Domain for yStocker

  DomainYPlanner:
    Type: String
    Default: "planner.li-family.us"
    Description: Domain for yPlanner

  DomainYPlanter:
    Type: String
    Default: "planter.li-family.us"
    Description: Domain for yPlanter

  DomainYHome:
    Type: String
    Default: "home.li-family.us"
    Description: Domain for yHome (landing page)

  CertEmail:
    Type: String
    Default: "admin@li-family.us"
    Description: Email for Let's Encrypt certificate notifications

  GitRepo:
    Type: String
    Default: "https://github.com/15th-Ave-NE/ylife.git"
    Description: HTTPS URL of the git repo to clone on first boot

  LatestAL2023Ami:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Latest Amazon Linux 2023 x86_64 AMI (auto-resolved per region)

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
Resources:

  # -- VPC & networking --------------------------------------------------------

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{ Key: Name, Value: !Sub "${AWS::StackName}-vpc" }]

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{ Key: Name, Value: !Sub "${AWS::StackName}-igw" }]

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags: [{ Key: Name, Value: !Sub "${AWS::StackName}-public-subnet" }]

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags: [{ Key: Name, Value: !Sub "${AWS::StackName}-rtb" }]

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # -- Security group ----------------------------------------------------------

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP, HTTPS, SSH
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 80,  ToPort: 80,  CidrIp: "0.0.0.0/0", Description: HTTP }
        - { IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: "0.0.0.0/0", Description: HTTPS }
        - { IpProtocol: tcp, FromPort: 22,  ToPort: 22,  CidrIp: !Ref AllowedSSHCidr, Description: SSH }
      SecurityGroupEgress:
        - { IpProtocol: "-1", CidrIp: "0.0.0.0/0" }
      Tags: [{ Key: Name, Value: !Sub "${AWS::StackName}-sg" }]

  # -- IAM role ----------------------------------------------------------------

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-ec2-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: ReadAppSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [ssm:GetParameter, ssm:GetParameters]
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/ystocker/*"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/yplanner/*"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/yplanter/*"
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:DescribeTable
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/ystocker-*"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/yplanner-*"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/yplanter-*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref InstanceRole]

  # -- EC2 instance ------------------------------------------------------------

  Instance:
    Type: AWS::EC2::Instance
    DependsOn: VPCGatewayAttachment
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !Ref LatestAL2023Ami
      SubnetId: !Ref PublicSubnet
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds: [!Ref InstanceSecurityGroup]
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs: { VolumeSize: 20, VolumeType: gp3, DeleteOnTermination: true }
      Tags: [{ Key: Name, Value: !Sub "${AWS::StackName}-instance" }]

      UserData:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash
            set -euxo pipefail
            exec > >(tee /var/log/app-init.log | logger -t app-init) 2>&1

            # ── Configuration ────────────────────────────────────────────
            # Add new apps here: NAME|PORT|DOMAIN|STATIC_DIR
            APPS="ystocker|8000|${DomainYStocker}|ystocker/static
            yplanner|8001|${DomainYPlanner}|yplanner/static
            yplanter|8002|${DomainYPlanter}|yplanter/static
            yhome|8003|${DomainYHome}|yhome/static"

            APP_DIR=/opt/ystocker
            APP_USER=ystocker
            REQ_FILES="requirements_stocker.txt requirements_planner.txt requirements_planter.txt requirements_home.txt"

            # ── System packages ──────────────────────────────────────────
            dnf update -y
            dnf install -y python3.11 python3.11-pip python3.11-devel gcc git nginx

            # ── App directory & user ─────────────────────────────────────
            useradd --system --shell /sbin/nologin --home-dir "$APP_DIR" "$APP_USER" || true
            mkdir -p "$APP_DIR"

            # ── Clone repo ───────────────────────────────────────────────
            if [ -n "${GitRepo}" ]; then
              git clone "${GitRepo}" /tmp/app-repo
              cp -r /tmp/app-repo/. "$APP_DIR/"
              rm -rf /tmp/app-repo
            fi

            # ── Python venv + deps ───────────────────────────────────────
            python3.11 -m venv "$APP_DIR/venv"
            "$APP_DIR/venv/bin/pip" install --upgrade pip
            "$APP_DIR/venv/bin/pip" install gunicorn

            for req in $REQ_FILES; do
              [ -f "$APP_DIR/$req" ] && "$APP_DIR/venv/bin/pip" install -r "$APP_DIR/$req"
            done

            mkdir -p "$APP_DIR/cache"
            chown -R "$APP_USER:$APP_USER" "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR"

            # ── Boot-time updater (shared, runs once before app services) ─
            cat > /etc/systemd/system/app-update.service <<'UPDATESVC'
            [Unit]
            Description=Git pull + pip sync on boot
            After=network-online.target
            Wants=network-online.target

            [Service]
            Type=oneshot
            User=root
            ExecStart=/bin/bash -c '\
              git config --global --add safe.directory /opt/ystocker; \
              git -C /opt/ystocker fetch origin && git -C /opt/ystocker reset --hard origin/main; \
              for r in requirements_stocker.txt requirements_planner.txt requirements_planter.txt requirements_home.txt; do \
                [ -f /opt/ystocker/$r ] && /opt/ystocker/venv/bin/pip install -q -r /opt/ystocker/$r; \
              done; \
              chown -R ystocker:ystocker /opt/ystocker'
            RemainAfterExit=yes

            [Install]
            WantedBy=multi-user.target
            UPDATESVC

            systemctl daemon-reload
            systemctl enable app-update

            # ── Create per-app services + nginx vhosts (loop) ────────────
            echo "$APPS" | while IFS='|' read -r NAME PORT DOMAIN STATIC; do
              [ -z "$NAME" ] && continue

              touch "/var/log/$NAME-access.log" "/var/log/$NAME-error.log"
              chown "$APP_USER:$APP_USER" "/var/log/$NAME-access.log" "/var/log/$NAME-error.log"

              # systemd service
              cat > "/etc/systemd/system/$NAME.service" <<EOF_SVC
            [Unit]
            Description=$NAME Flask app (Gunicorn)
            After=network.target app-update.service
            Wants=app-update.service

            [Service]
            User=$APP_USER
            Group=$APP_USER
            WorkingDirectory=$APP_DIR
            Environment="PATH=$APP_DIR/venv/bin"
            Environment="AWS_REGION=${AWS::Region}"
            ExecStart=$APP_DIR/venv/bin/gunicorn \
                      --workers 1 \
                      --bind 127.0.0.1:$PORT \
                      --timeout 120 \
                      --access-logfile /var/log/$NAME-access.log \
                      --error-logfile  /var/log/$NAME-error.log \
                      "$NAME:create_app()"
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF_SVC

              # nginx vhost
              cat > "/etc/nginx/conf.d/$NAME.conf" <<EOF_NGX
            server {
                listen 80;
                server_name $DOMAIN;

                location / {
                    proxy_pass         http://127.0.0.1:$PORT;
                    proxy_set_header   Host              \$host;
                    proxy_set_header   X-Real-IP         \$remote_addr;
                    proxy_set_header   X-Forwarded-For   \$proxy_add_x_forwarded_for;
                    proxy_read_timeout 120s;
                }

                location /static/ {
                    alias $APP_DIR/$STATIC/;
                    expires 7d;
                    add_header Cache-Control "public";
                }
            }
            EOF_NGX

              systemctl daemon-reload
              systemctl enable "$NAME"
              systemctl start "$NAME"
              echo "Started $NAME on :$PORT for $DOMAIN"
            done

            # ── nginx ────────────────────────────────────────────────────
            rm -f /etc/nginx/conf.d/default.conf /etc/nginx/sites-enabled/default 2>/dev/null || true
            systemctl enable nginx
            systemctl restart nginx

            # ── SSL (Let's Encrypt) ──────────────────────────────────────
            dnf install -y python3-certbot-nginx || dnf install -y certbot python3-certbot-nginx || true

            MY_IP=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4)

            # Wait for all domains to resolve
            echo "$APPS" | while IFS='|' read -r NAME PORT DOMAIN STATIC; do
              [ -z "$DOMAIN" ] && continue
              echo "Waiting for DNS: $DOMAIN -> $MY_IP"
              for i in $(seq 1 20); do
                RESOLVED=$(dig +short "$DOMAIN" | tail -1)
                [ "$RESOLVED" = "$MY_IP" ] && echo "  OK after $i checks" && break
                echo "  attempt $i: got '$RESOLVED' — waiting 30s..."
                sleep 30
              done
            done

            # Build certbot -d flags
            CERT_FLAGS=""
            while IFS='|' read -r NAME PORT DOMAIN STATIC; do
              [ -z "$DOMAIN" ] && continue
              CERT_FLAGS="$CERT_FLAGS -d $DOMAIN"
            done <<< "$APPS"

            if [ -n "$CERT_FLAGS" ]; then
              certbot --nginx \
                      --non-interactive \
                      --agree-tos \
                      --email ${CertEmail} \
                      $CERT_FLAGS \
                      --redirect || echo "Certbot failed — check /var/log/letsencrypt/letsencrypt.log"
            fi

            echo "Bootstrap complete — all apps deployed."

  # -- Elastic IP --------------------------------------------------------------

  ElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      InstanceId: !Ref Instance
      Tags: [{ Key: Name, Value: !Sub "${AWS::StackName}-eip" }]

# -----------------------------------------------------------------------------
# Outputs
# -----------------------------------------------------------------------------
Outputs:

  PublicIP:
    Description: Elastic IP
    Value: !Ref ElasticIP
    Export: { Name: !Sub "${AWS::StackName}-PublicIP" }

  YStockerURL:
    Value: !Sub "https://${DomainYStocker}/"

  YPlannerURL:
    Value: !Sub "https://${DomainYPlanner}/"

  YPlanterURL:
    Value: !Sub "https://${DomainYPlanter}/"

  YHomeURL:
    Value: !Sub "https://${DomainYHome}/"

  DirectIPURL:
    Description: Direct IP URL (before DNS)
    Value: !Sub "http://${ElasticIP}/"

  SSHCommand:
    Value: !Sub "ssh -i ~/.ssh/${KeyName}.pem ec2-user@${ElasticIP}"

  LogsCommand:
    Value: !Sub "ssh ec2-user@${ElasticIP} 'sudo journalctl -u ystocker -u yplanner -u yplanter -u yhome -f'"
