{% extends "base.html" %}
{% block title %}yBG — Landlord Login{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-sky-500 to-blue-500 shadow-lg shadow-sky-500/20 mb-4">
        <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-extrabold mb-1">
        <span class="bg-gradient-to-r from-sky-400 to-blue-500 bg-clip-text text-transparent">yBG</span>
      </h1>
      <p class="text-sm text-slate-500 dark:text-slate-400">Landlord portal — sign in to manage applications</p>
    </div>

    <form method="POST" class="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 p-6 space-y-4">
      {% if error %}
      <div class="p-3 rounded-xl bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-700/50 text-sm text-red-600 dark:text-red-400">{{ error }}</div>
      {% endif %}

      <div>
        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Email</label>
        <input type="email" name="email" required autofocus placeholder="admin@li-family.us"
               class="w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm focus:ring-2 focus:ring-brand/40 outline-none">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Password</label>
        <input type="password" name="password" required
               class="w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm focus:ring-2 focus:ring-brand/40 outline-none">
      </div>
      <button type="submit"
              class="w-full px-4 py-2.5 rounded-xl bg-gradient-to-r from-sky-500 to-blue-500 text-white text-sm font-semibold hover:from-sky-600 hover:to-blue-600 transition shadow-lg shadow-sky-500/20">
        Sign In
      </button>
    </form>

    <p class="text-center text-xs text-slate-400 dark:text-slate-500 mt-4">
      Set <code class="bg-slate-100 dark:bg-slate-800 px-1 rounded">YBG_ADMIN_EMAIL</code> and
      <code class="bg-slate-100 dark:bg-slate-800 px-1 rounded">YBG_ADMIN_PASSWORD</code> in <code>.env</code>
    </p>
  </div>
</div>
{% endblock %}
