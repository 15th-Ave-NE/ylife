<!doctype html>
<html lang="en" class="h-full dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}yPay — Payments{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('pay.static', filename='favicon.svg') }}">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', dark: '#4f46e5', light: '#818cf8' },
            surface: '#0f172a',
            panel: '#1e293b',
            border: '#334155',
          },
          fontFamily: { mono: ['JetBrains Mono', 'Fira Code', 'monospace'] }
        }
      }
    }
  </script>

  <script>
    (function() {
      const theme = localStorage.getItem('ypay_theme') || 'dark';
      if (theme === 'light') document.documentElement.classList.remove('dark');
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('pay.static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>

<body class="bg-white dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen flex flex-col font-[Inter]">

  <header class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-screen-xl mx-auto px-4 sm:px-6 flex items-center h-14 gap-4">
      <a href="/" class="flex items-center gap-2 font-bold text-lg shrink-0">
        <svg class="w-6 h-6 text-brand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
        <span class="bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent">yPay</span>
      </a>

      <div class="ml-auto flex items-center gap-2">
        <a href="https://li-family.us" class="text-xs text-slate-400 hover:text-brand transition">Li Family</a>
        <button onclick="toggleTheme()"
                class="p-2 rounded-md text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition"
                title="Toggle theme">
          <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-screen-xl mx-auto w-full px-4 sm:px-6 py-6 sm:py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-slate-200 dark:border-slate-800 py-3 text-center text-xs text-slate-500 dark:text-slate-600">
    <span>yPay &middot; Secure payments via Stripe</span>
    &nbsp;&middot;&nbsp;
    <a href="https://li-family.us" class="hover:text-brand transition">li-family.us</a>
    &nbsp;&middot;&nbsp;
    <span>&copy; 2025-2026 Li Family</span>
  </footer>

  <script>
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.classList.contains('dark');
    if (isDark) {
      html.classList.remove('dark');
      localStorage.setItem('ypay_theme', 'light');
    } else {
      html.classList.add('dark');
      localStorage.setItem('ypay_theme', 'dark');
    }
  }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
