{% extends "base.html" %}

{% block title %}yPay — Payment Cancelled{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="text-center max-w-md fade-up">
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-slate-100 dark:bg-slate-800 mb-6">
      <svg class="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </div>
    <h1 class="text-2xl sm:text-3xl font-extrabold mb-3">Payment Cancelled</h1>
    <p class="text-slate-500 dark:text-slate-400 mb-6 leading-relaxed">
      No worries! No charge was made. You can try again whenever you're ready.
    </p>
    <a href="/"
       class="inline-block px-5 py-2.5 rounded-xl bg-gradient-to-r from-indigo-500 to-violet-500 text-white text-sm font-semibold hover:from-indigo-600 hover:to-violet-600 transition">
      Back to yPay
    </a>
  </div>
</div>
{% endblock %}
